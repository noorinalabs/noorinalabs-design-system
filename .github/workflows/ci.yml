name: CI

on:
  push:
    branches: [main, 'deployments/**']
  pull_request:
    branches: [main, 'deployments/**']

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Test with coverage
        run: npx vitest run --coverage

  validate-package:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Verify package contents
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt
          grep 'dist/styles.css' /tmp/pack-output.txt || (echo "FAIL: dist/styles.css missing from package" && exit 1)
          grep 'dist/index.js' /tmp/pack-output.txt || (echo "FAIL: dist/index.js missing from package" && exit 1)
          grep 'dist/index.cjs' /tmp/pack-output.txt || (echo "FAIL: dist/index.cjs missing from package" && exit 1)
          echo "Package contents verified"

      - name: Verify exports field resolution
        run: node scripts/validate-package-exports.mjs

      - name: Install published package from GitHub Packages
        run: |
          mkdir -p /tmp/consumer-test
          cd /tmp/consumer-test
          npm init -y
          echo '@noorinalabs:registry=https://npm.pkg.github.com' > .npmrc
          npm install @noorinalabs/design-system@0.0.1 || echo "SKIP: Package not yet published to GitHub Packages"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
