name: CI

on:
  push:
    branches: [main, 'deployments/**']
  pull_request:
    branches: [main, 'deployments/**']

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Test with coverage
        run: npx vitest run --coverage

  validate-package:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Verify package contents
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt
          grep 'dist/styles.css' /tmp/pack-output.txt || (echo "FAIL: dist/styles.css missing from package" && exit 1)
          grep 'dist/index.js' /tmp/pack-output.txt || (echo "FAIL: dist/index.js missing from package" && exit 1)
          grep 'dist/index.cjs' /tmp/pack-output.txt || (echo "FAIL: dist/index.cjs missing from package" && exit 1)
          echo "Package contents verified"

      - name: Verify base tokens compiled to :root (not raw @theme) — #104
        run: |
          # The published dist is consumed as plain CSS. A raw Tailwind `@theme {}`
          # block is an unknown at-rule to browsers and is silently ignored, so any
          # base token trapped inside it never applies for non-Tailwind consumers.
          if grep -q '@theme' dist/styles.css; then
            echo "FAIL: raw @theme leaked into published dist/styles.css — base tokens will be ignored by non-Tailwind consumers (#104)"
            exit 1
          fi
          grep -q -- '--color-border:' dist/styles.css || (echo "FAIL: --color-border not emitted to dist (#104)" && exit 1)
          grep -q ':root' dist/styles.css || (echo "FAIL: no :root selector in dist (#104)" && exit 1)
          echo "Base tokens compiled to :root — verified (#104)"

      - name: Verify component utilities compiled into dist — ds#115
        run: |
          # The interactive components express their structural contract as Tailwind
          # utility classes. These must be compiled into the published dist so
          # consumers get them without hand-mirroring via `@source inline(...)`.
          grep -q '@layer utilities{' dist/styles.css || (echo "FAIL: utilities layer missing from dist (ds#115)" && exit 1)
          grep -Fq '.fixed{' dist/styles.css || (echo "FAIL: Dialog overlay/content utilities not compiled into dist (ds#115)" && exit 1)
          grep -Fq '.bg-background{background-color:var(--color-background)}' dist/styles.css \
            || (echo "FAIL: DS-color utilities not wired to runtime tokens in dist (ds#115)" && exit 1)
          echo "Component utilities compiled into dist — verified (ds#115)"

      - name: Verify exports field resolution
        run: node scripts/validate-package-exports.mjs

      - name: Install published package from GitHub Packages
        run: |
          mkdir -p /tmp/consumer-test
          cd /tmp/consumer-test
          npm init -y
          echo '@noorinalabs:registry=https://npm.pkg.github.com' > .npmrc
          npm install @noorinalabs/design-system@0.0.1 || echo "SKIP: Package not yet published to GitHub Packages"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
