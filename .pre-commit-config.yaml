# Pre-commit hooks for noorinalabs-design-system
# Install:  pre-commit install && pre-commit install --hook-type pre-push
# Docs:     https://pre-commit.com/
#
# This MIRRORS .github/workflows/ci.yml + docs.yml so local commits/pushes fail
# fast instead of surfacing a lint/type/build/test/actionlint error only after a
# PR is opened (Phase-3 end-state criterion #6 / #327).
#
# Stage split (cheapest first, fail-fast):
#   pre-commit (fast, every commit) — gitleaks, prettier (format:check),
#     ESLint, actionlint (workflow lint). Quick checks that catch the most
#     common defects before a commit is recorded.
#   pre-push   (heavier, every push) — TypeScript type check, build, unit tests.
#     These run the whole compile+test surface, so they're push-time not
#     commit-time to keep the commit loop snappy while still catching
#     everything before it leaves the machine.
#
# The kind-level mirror (prettier, eslint, typescript, build, vitest, gitleaks,
# actionlint, structural-ontology present on both sides) is enforced in CI by
# `scripts/pre_commit_ci_sync.py` — if a future edit drops a check from one
# side, that gate (the "Pre-commit <-> CI sync-drift gate" job in docs.yml)
# fails the build.
#
# Prettier IS gated as of #91: the src/ + scripts/ corpus was reformatted in a
# dedicated commit, then `format:check` was added to ci.yml's `ci` job and
# mirrored here as the `prettier` commit-stage hook. (PR #90 / Refs
# noorinalabs-main#327 shipped the `format`/`format:check` npm scripts but
# deferred the gate until the corpus was clean.)
#
# Prerequisites:
#   - Node.js 20+ with npm (run `npm ci` once so node_modules is present)

repos:
  # --- Secret detection (commit stage) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        name: gitleaks
        stages: [pre-commit]

  # --- Workflow lint (commit stage) — mirrors docs.yml actionlint job ---
  # The -ignore matches docs.yml: storybook.yml's deploy job is intentionally
  # `if: false` (owner-gated Pages disable, not a defect); suppress only that
  # exact if-cond message so every other workflow lint still gates locally.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        name: actionlint
        args: ["-ignore", "constant expression \"false\" in condition"]
        stages: [pre-commit]

  # --- Spellcheck (commit stage) — mirrors docs.yml `spellcheck` cspell job ---
  # A typo in authored prose should fail at commit time, not only surface as a
  # CI red after push (rollout of noorinalabs-main#684). Pinned to v8.4.0 of
  # cspell-cli to match the exact cspell the
  # `streetsidesoftware/cspell-action@…v8.4.0` CI step bundles — same engine +
  # dictionaries on both sides, so a word that passes locally passes in CI and
  # vice-versa. `language: node`, so pre-commit provisions its own node/cspell
  # env (no system cspell required).
  #
  # `files` is the regex equivalent of the CI action's authored-prose glob set
  # (CLAUDE.md, README.md, RUNBOOK.md, docs, skills, charter); `--config
  # .cspell.json` reuses the same dictionaries + ignore rules CI loads. New
  # domain terms go in .cspell/project-words.txt — never bless a wrong spelling.
  #
  # NOTE: this repo's sync-drift gate (scripts/pre_commit_ci_sync.py) does NOT
  # yet classify a `cspell` kind, so it cannot enforce this mirror — closing
  # that blind spot is the org-wide follow-up tracked under noorinalabs-main#684.
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v8.4.0
    hooks:
      - id: cspell
        name: cspell
        args: ["--no-must-find-files", "--no-progress", "--no-summary", "--config", ".cspell.json"]
        files: ^(CLAUDE\.md|README\.md|RUNBOOK\.md|docs/.*\.md|\.claude/skills/.*\.md|\.claude/team/charter\.md)$
        stages: [pre-commit]

  # --- Local hooks ---
  - repo: local
    hooks:
      # Commit stage: prettier format check (mirror ci.yml Format check). Fast,
      # so it runs at commit time alongside eslint. Uses the same `format:check`
      # npm script CI runs, over the same src/ + scripts/ glob.
      - id: prettier
        name: prettier (format:check)
        entry: bash -c 'npm run format:check'
        language: system
        pass_filenames: false
        types_or: [ts, tsx, css, javascript]
        stages: [pre-commit]

      # Commit stage: fast lint (mirror ci.yml Lint). Quick to run, catches the
      # most common defects pre-commit.
      - id: eslint
        name: eslint
        entry: bash -c 'npm run lint'
        language: system
        pass_filenames: false
        types_or: [ts, tsx, javascript]
        stages: [pre-commit]

      # Push stage: heavier compile + build + tests (mirror ci.yml Typecheck,
      # Build, Test). Run before code leaves the machine, not on every commit,
      # to keep the commit loop snappy.
      - id: typecheck
        name: typecheck (pre-push)
        entry: bash -c 'npm run typecheck'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: build
        name: build (pre-push)
        entry: bash -c 'npm run build'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: test
        name: test (pre-push)
        entry: bash -c 'npm run test'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Structural ontology staleness gate (#130). Mirrors the
      # `structural-ontology` CI workflow's `check` step: regenerates the
      # committed structural index (ontology/structural/{code-graph.json,
      # llms.txt}) with the OWNED generator in noorinalabs-main and fails if it
      # has drifted from the source tree. The generator is consumed from the
      # sibling noorinalabs-main checkout (auto-discovered via the standard org
      # layout, or $ONTOLOGY_GEN_LIB) — it is NOT vendored here. Both the
      # generator and this wrapper are stdlib-only, so `python3` runs it with no
      # uv/pip install. The `structural-ontology` sync-gate kind DEMANDS this
      # mirror exist (noorinalabs-main#684 parity contract). Regenerate with
      # `python3 scripts/structural_ontology.py emit` and commit the result.
      - id: structural-ontology-staleness
        name: structural-ontology-staleness
        entry: python3 scripts/structural_ontology.py check
        language: system
        pass_filenames: false
        files: ^(src/.*\.(ts|tsx|js|jsx|mjs|cjs)|scripts/structural_ontology\.py|ontology/structural/.*)$
        stages: [pre-commit]
