# Pre-commit hooks for noorinalabs-design-system
# Install:  pre-commit install && pre-commit install --hook-type pre-push
# Docs:     https://pre-commit.com/
#
# This MIRRORS .github/workflows/ci.yml + docs.yml so local commits/pushes fail
# fast instead of surfacing a lint/type/build/test/actionlint error only after a
# PR is opened (Phase-3 end-state criterion #6 / #327).
#
# Stage split (cheapest first, fail-fast):
#   pre-commit (fast, every commit) — gitleaks, prettier (format:check),
#     ESLint, actionlint (workflow lint). Quick checks that catch the most
#     common defects before a commit is recorded.
#   pre-push   (heavier, every push) — TypeScript type check, build, unit tests.
#     These run the whole compile+test surface, so they're push-time not
#     commit-time to keep the commit loop snappy while still catching
#     everything before it leaves the machine.
#
# The kind-level mirror (prettier, eslint, typescript, build, vitest, gitleaks,
# actionlint present on both sides) is enforced in CI by
# `scripts/pre_commit_ci_sync.py` — if a future edit drops a check from one
# side, that gate (the "Pre-commit <-> CI sync-drift gate" job in docs.yml)
# fails the build.
#
# Prettier IS gated as of #91: the src/ + scripts/ corpus was reformatted in a
# dedicated commit, then `format:check` was added to ci.yml's `ci` job and
# mirrored here as the `prettier` commit-stage hook. (PR #90 / Refs
# noorinalabs-main#327 shipped the `format`/`format:check` npm scripts but
# deferred the gate until the corpus was clean.)
#
# Prerequisites:
#   - Node.js 20+ with npm (run `npm ci` once so node_modules is present)

repos:
  # --- Secret detection (commit stage) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        name: gitleaks
        stages: [pre-commit]

  # --- Workflow lint (commit stage) — mirrors docs.yml actionlint job ---
  # The -ignore matches docs.yml: storybook.yml's deploy job is intentionally
  # `if: false` (owner-gated Pages disable, not a defect); suppress only that
  # exact if-cond message so every other workflow lint still gates locally.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        name: actionlint
        args: ["-ignore", "constant expression \"false\" in condition"]
        stages: [pre-commit]

  # --- Local hooks ---
  - repo: local
    hooks:
      # Commit stage: prettier format check (mirror ci.yml Format check). Fast,
      # so it runs at commit time alongside eslint. Uses the same `format:check`
      # npm script CI runs, over the same src/ + scripts/ glob.
      - id: prettier
        name: prettier (format:check)
        entry: bash -c 'npm run format:check'
        language: system
        pass_filenames: false
        types_or: [ts, tsx, css, javascript]
        stages: [pre-commit]

      # Commit stage: fast lint (mirror ci.yml Lint). Quick to run, catches the
      # most common defects pre-commit.
      - id: eslint
        name: eslint
        entry: bash -c 'npm run lint'
        language: system
        pass_filenames: false
        types_or: [ts, tsx, javascript]
        stages: [pre-commit]

      # Push stage: heavier compile + build + tests (mirror ci.yml Typecheck,
      # Build, Test). Run before code leaves the machine, not on every commit,
      # to keep the commit loop snappy.
      - id: typecheck
        name: typecheck (pre-push)
        entry: bash -c 'npm run typecheck'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: build
        name: build (pre-push)
        entry: bash -c 'npm run build'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: test
        name: test (pre-push)
        entry: bash -c 'npm run test'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
